<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumScript Web Example</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f111a; color: #fff; padding: 40px; }
        h1 { color: #00ffcc; }
        p { color: #8892b0; }
    </style>
    <!-- 1. Load the Go WebAssembly Executer -->
    <script src="wasm_exec.js"></script>
</head>
<body>
    <h1>QuantumScript Web Browser Runtime</h1>
    <p>The code below is running entirely in your browser using the QuantumScript WASM Engine.</p>

    <!-- 2. Write QuantumScript Directly in HTML -->
    <script type="text/quantumscript">
        const q1: qubit = new Qubit();
        const q2: qubit = new Qubit();

        superpose(q1);

        // Entangle
        if (q1) {
            invert(q2);
        }

        measure(q1);
        measure(q2);
    </script>

    <!-- 3. Load the Connector -->
    <script src="qs-browser.js"></script>
</body>
</html>
